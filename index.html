    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Person",
        "name": "Jordan Low Jun Yi",
        "url": "https://jordanlowjunyi.github.io/Jordan/",

    <!-- Preconnect for Font Optimization -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playpen+Sans:wght@100..800&display=swap" rel="stylesheet">

    <!-- Pre-mount loader: shown before React hydrates, replaced on mount -->
    <style>
      #root .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0a0f1c;
      }
      .app-spinner {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.15);
        border-top-color: #f59e0b;
        animation: app-spin 0.8s linear infinite;
      }
      @keyframes app-spin {
        to { transform: rotate(360deg); }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-spinner { animation: none; }
      }
    </style>

    <!-- 404 handling -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root">
      <div class="app-loading" aria-hidden="true"><div class="app-spinner"></div></div>
    </div>
    <noscript>
      <div style="max-width: 640px; margin: 4rem auto; padding: 0 1.5rem; font-family: system-ui, sans-serif; color: #e5e7eb; text-align: center;">

        You can still reach out at <a href="mailto:jordanljy@u.nus.edu" style="color:#f59e0b;">jordanljy@u.nus.edu</a>.
      </div>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
